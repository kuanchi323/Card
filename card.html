<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💳 卡費追蹤</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0f0f13;
    font-family: 'Noto Sans TC', 'Helvetica Neue', sans-serif;
    color: #e8e6e0;
  }
  input:focus { outline: none; }
  button { cursor: pointer; border: none; background: none; font-family: inherit; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: #1a1a20; }
  ::-webkit-scrollbar-thumb { background: #3a3a44; border-radius: 2px; }

/* Header */
.header {
border-bottom: 1px solid #1e1e28;
padding: 20px 28px;
display: flex;
align-items: center;
justify-content: space-between;
flex-wrap: wrap;
gap: 12px;
}
.logo {
display: flex; align-items: center; gap: 14px;
}
.logo-icon {
width: 36px; height: 36px; border-radius: 10px;
background: linear-gradient(135deg, #e8c97e, #c9a84c);
display: flex; align-items: center; justify-content: center;
font-size: 18px;
}
.logo-title { font-size: 17px; font-weight: 700; letter-spacing: 0.5px; }
.logo-sub { font-size: 11px; color: #555; letter-spacing: 1px; margin-top: 1px; }

.tab-bar {
display: flex; gap: 6px;
background: #15151d;
padding: 4px;
border-radius: 24px;
border: 1px solid #1e1e28;
}
.tab-btn {
padding: 8px 20px; border-radius: 20px;
font-size: 13px; font-weight: 500; color: #888;
transition: all 0.2s; letter-spacing: 0.5px;
}
.tab-btn.active { background: #e8c97e; color: #0f0f13; }
.tab-btn:hover:not(.active) { color: #ccc; }

/* Main */
.main { padding: 24px 28px; max-width: 860px; margin: 0 auto; }

/* Nav */
.month-nav {
display: flex; align-items: center; justify-content: space-between;
margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
}
.nav-center { display: flex; align-items: center; gap: 16px; }
.nav-btn {
width: 32px; height: 32px; border-radius: 50%;
background: #1e1e28; color: #aaa;
display: flex; align-items: center; justify-content: center;
font-size: 18px; transition: all 0.15s;
}
.nav-btn:hover { background: #2a2a38; color: #e8c97e; }
.month-display { text-align: center; min-width: 100px; }
.month-label { font-size: 26px; font-weight: 700; color: #e8c97e; font-family: ‘DM Mono’, monospace; }
.year-small { font-size: 12px; color: #555; margin-top: 2px; }
.year-nav { display: flex; align-items: center; gap: 8px; }
.year-label { font-family: ‘DM Mono’, monospace; font-size: 14px; color: #888; min-width: 50px; text-align: center; }

/* Table */
.table-wrap {
background: #14141c; border: 1px solid #1e1e28;
border-radius: 14px; overflow: hidden; margin-bottom: 20px;
overflow-x: auto;
}
table { width: 100%; border-collapse: collapse; min-width: 500px; }
th {
padding: 12px 16px; text-align: left;
font-size: 11px; color: #555; font-weight: 500;
letter-spacing: 1.5px; text-transform: uppercase;
border-bottom: 1px solid #1e1e28;
}
th.right { text-align: right; }
td { padding: 0; border-bottom: 1px solid #1a1a22; }
tr:last-child td { border-bottom: none; }
tr:hover .delete-btn { opacity: 1; }

.td-pad { padding: 12px 16px; }
.card-name { display: flex; align-items: center; gap: 10px; }
.color-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.card-label { font-size: 15px; font-weight: 500; }
.day-text { font-size: 13px; color: #888; }
.day-num { color: #e8c97e; font-family: ‘DM Mono’, monospace; }

.amount-cell {
padding: 6px 8px;
}
.amount-inner {
background: transparent; transition: background 0.15s;
border-radius: 6px; cursor: pointer; min-height: 44px;
display: flex; align-items: center; justify-content: flex-end;
padding: 0 12px;
}
.amount-inner:hover { background: #1e1e28; }
.amount-inner.editing { background: #1e1e28; }
.amount-text { font-family: ‘DM Mono’, monospace; font-size: 15px; }
.amount-text.has-val { color: #f0ede6; font-weight: 500; }
.amount-text.empty { color: #333; }
.amount-input {
background: transparent; border: none;
color: #f0ede6; font-family: ‘DM Mono’, monospace;
font-size: 15px; width: 100%; text-align: right;
}

.delete-btn {
opacity: 0; color: #666; font-size: 13px;
transition: opacity 0.15s; padding: 4px 6px; border-radius: 4px;
}
.delete-btn:hover { color: #e05c5c; }
.delete-td { padding: 8px 12px; text-align: right; }

/* Total bar */
.total-bar {
background: linear-gradient(135deg, #1e1e28, #16161e);
border: 1px solid #2a2a34;
border-radius: 12px; padding: 20px 24px;
display: flex; align-items: center; justify-content: space-between;
margin-bottom: 20px; flex-wrap: wrap; gap: 16px;
}
.total-label { font-size: 11px; letter-spacing: 1.5px; color: #555; text-transform: uppercase; margin-bottom: 4px; }
.total-amount { font-family: ‘DM Mono’, monospace; font-size: 28px; font-weight: 700; color: #e8c97e; }
.total-breakdown { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
.breakdown-item { display: flex; gap: 8px; align-items: center; }
.breakdown-dot { width: 6px; height: 6px; border-radius: 50%; }
.breakdown-name { font-size: 12px; color: #666; }
.breakdown-val { font-family: ‘DM Mono’, monospace; font-size: 13px; color: #999; }

.hint { text-align: center; font-size: 12px; color: #383840; margin-top: 4px; }

/* Add card button */
.add-card-btn {
display: flex; align-items: center; gap: 8px;
padding: 10px 22px; border-radius: 24px;
border: 1px dashed #2a2a34;
color: #555; font-size: 13px; transition: all 0.2s;
margin: 24px auto 0; display: block;
}
.add-card-btn:hover { color: #e8c97e; border-color: rgba(232,201,126,0.3); }

/* Modal */
.modal-overlay {
display: none; position: fixed; inset: 0;
background: rgba(0,0,0,0.7); z-index: 100;
align-items: center; justify-content: center;
backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal-box {
background: #1a1a22; border: 1px solid #2a2a34;
border-radius: 16px; padding: 28px; width: 340px;
animation: fadeIn 0.2s ease;
}
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 22px; }
.field-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: #666; margin-bottom: 6px; font-weight: 500; }
.field-input {
width: 100%; background: #0f0f16; border: 1px solid #2a2a34;
border-radius: 8px; padding: 10px 12px; color: #e8e6e0;
font-size: 14px; font-family: ‘Noto Sans TC’, sans-serif;
transition: border-color 0.2s; margin-bottom: 16px;
}
.field-input:focus { border-color: #e8c97e; }
.color-picker { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; margin-bottom: 22px; }
.color-swatch {
width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
border: 2px solid transparent; transition: all 0.15s;
}
.color-swatch.selected { border-color: #fff; outline: 2px solid currentColor; outline-offset: 2px; }
.modal-btns { display: flex; gap: 10px; }
.btn-cancel {
flex: 1; padding: 11px; border-radius: 10px;
background: #1e1e28; color: #888; font-size: 14px;
font-family: ‘Noto Sans TC’, sans-serif;
}
.btn-confirm {
flex: 1; padding: 11px; border-radius: 10px;
background: linear-gradient(135deg, #e8c97e, #c9a84c);
color: #0f0f13; font-size: 14px; font-weight: 700;
font-family: ‘Noto Sans TC’, sans-serif;
}

/* Annual table extras */
.annual-current { background: #1a1a24; }
.annual-arrow { margin-right: 6px; font-size: 10px; }
.annual-foot { border-top: 1px solid #252530; background: #0f0f16; }
.annual-foot td { padding: 12px 16px; font-family: ‘DM Mono’, monospace; font-size: 14px; font-weight: 700; }

@keyframes fadeIn {
from { opacity: 0; transform: translateY(8px); }
to { opacity: 1; transform: translateY(0); }
}

/* confirm dialog */
.confirm-dialog {
display: none; position: fixed; inset: 0;
background: rgba(0,0,0,0.7); z-index: 200;
align-items: center; justify-content: center;
backdrop-filter: blur(4px);
}
.confirm-dialog.open { display: flex; }
.confirm-box {
background: #1a1a22; border: 1px solid #2a2a34;
border-radius: 16px; padding: 28px; width: 300px;
text-align: center; animation: fadeIn 0.2s ease;
}
.confirm-box p { font-size: 15px; margin-bottom: 20px; color: #ccc; line-height: 1.6; }
.confirm-btns { display: flex; gap: 10px; justify-content: center; }
</style>

</head>

<script>
const STORAGE_KEY = 'card-tracker-v1';
const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const COLORS = ['#C0392B','#E67E22','#e8c97e','#27AE60','#2E86AB','#8E44AD','#E91E63','#607D8B'];

let state = {
  cards: [
    { id: 1, name: '元大', statementDay: 18, dueDay: 4, color: '#C0392B' },
    { id: 2, name: '國泰世華', statementDay: 25, dueDay: 15, color: '#1A5276' },
  ],
  records: {}
};

const now = new Date();
let selectedYear = now.getFullYear();
let selectedMonth = now.getMonth();
let activeTab = 'monthly';
let selectedColor = COLORS[4];
let deleteTargetId = null;

// --- Storage ---
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = JSON.parse(raw);
  } catch(e) {}
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

// --- Keys ---
function getKey(year, month, cardId) { return `${year}-${month+1}-${cardId}`; }
function getAmount(year, month, cardId) { return state.records[getKey(year, month, cardId)] || 0; }
function setAmount(year, month, cardId, val) {
  state.records[getKey(year, month, cardId)] = val;
  save();
}

// --- Format ---
function fmt(n) { return Number(n).toLocaleString('zh-TW'); }
function parseAmt(s) { return parseInt(s.replace(/[^0-9]/g,''), 10) || 0; }

// --- Tab ---
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('view-monthly').style.display = tab === 'monthly' ? '' : 'none';
  document.getElementById('view-annual').style.display = tab === 'annual' ? '' : 'none';
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='monthly')||(i===1&&tab==='annual')));
  render();
}

// --- Nav ---
function prevMonth() { if(selectedMonth===0){selectedMonth=11;selectedYear--;}else selectedMonth--; render(); }
function nextMonth() { if(selectedMonth===11){selectedMonth=0;selectedYear++;}else selectedMonth++; render(); }
function prevYear() { selectedYear--; render(); }
function nextYear() { selectedYear++; render(); }

// --- Render Monthly ---
function renderMonthly() {
  document.getElementById('month-label').textContent = MONTHS[selectedMonth];
  document.getElementById('year-label-m').textContent = selectedYear;
  document.getElementById('year-label-nav').textContent = selectedYear;

  const tbody = document.getElementById('monthly-tbody');
  tbody.innerHTML = '';
  let monthTotal = 0;

  state.cards.forEach((card, idx) => {
    const amount = getAmount(selectedYear, selectedMonth, card.id);
    monthTotal += amount;

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="td-pad">
        <div class="card-name">
          <div class="color-dot" style="background:${card.color}"></div>
          <span class="card-label">${card.name}</span>
        </div>
      </td>
      <td class="td-pad"><span class="day-text">每月 <span class="day-num">${card.statementDay}</span> 號</span></td>
      <td class="td-pad" style="text-align:right"><span class="day-text"><span class="day-num">${card.dueDay}</span> 號前</span></td>
      <td class="amount-cell">
        <div class="amount-inner" id="cell-${card.id}" onclick="startEdit(${card.id}, this)">
          <span class="amount-text ${amount>0?'has-val':'empty'}" id="amt-${card.id}">
            ${amount>0 ? '$'+fmt(amount) : '—'}
          </span>
        </div>
      </td>
      <td class="delete-td">
        <button class="delete-btn" onclick="askDelete(${card.id}, '${card.name}')">✕</button>
      </td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById('month-total').textContent = '$' + fmt(monthTotal);

  const breakdown = document.getElementById('month-breakdown');
  breakdown.innerHTML = '';
  state.cards.forEach(card => {
    const a = getAmount(selectedYear, selectedMonth, card.id);
    if (!a) return;
    breakdown.innerHTML += `
      <div class="breakdown-item">
        <div class="breakdown-dot" style="background:${card.color}"></div>
        <span class="breakdown-name">${card.name}</span>
        <span class="breakdown-val">$${fmt(a)}</span>
      </div>
    `;
  });
}

// --- Edit cell ---
function startEdit(cardId, cell) {
  if (cell.querySelector('input')) return;
  const current = getAmount(selectedYear, selectedMonth, cardId);
  cell.classList.add('editing');
  cell.innerHTML = `<input class="amount-input" id="edit-input-${cardId}" type="number" placeholder="0" value="${current||''}">`;
  const inp = document.getElementById('edit-input-' + cardId);
  inp.focus();
  inp.select();
  inp.addEventListener('blur', () => commitEdit(cardId, cell, inp.value));
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') inp.blur();
    if (e.key === 'Escape') { inp.removeEventListener('blur', ()=>{}); renderMonthly(); }
  });
}

function commitEdit(cardId, cell, val) {
  const amount = parseAmt(val);
  setAmount(selectedYear, selectedMonth, cardId, amount);
  renderMonthly();
}

// --- Render Annual ---
function renderAnnual() {
  document.getElementById('annual-year-label').textContent = selectedYear;
  const table = document.getElementById('annual-table');
  let html = '<thead><tr><th>月份</th>';
  state.cards.forEach(c => { html += `<th class="right" style="color:${c.color}">${c.name}</th>`; });
  html += '<th class="right">合計</th></tr></thead><tbody>';

  MONTHS.forEach((m, mi) => {
    const total = state.cards.reduce((s,c) => s + getAmount(selectedYear, mi, c.id), 0);
    const isCurrent = selectedYear === now.getFullYear() && mi === now.getMonth();
    html += `<tr ${isCurrent ? 'class="annual-current"' : ''}>`;
    html += `<td class="td-pad" style="font-size:13px;color:${isCurrent?'#e8c97e':'#888'}">`;
    if (isCurrent) html += `<span class="annual-arrow">▶</span>`;
    html += m + '</td>';
    state.cards.forEach(c => {
      const a = getAmount(selectedYear, mi, c.id);
      html += `<td class="td-pad" style="text-align:right;font-family:'DM Mono',monospace;font-size:14px;color:${a>0?'#d0cec8':'#2a2a30'}">`;
      html += a > 0 ? '$'+fmt(a) : '—';
      html += '</td>';
    });
    html += `<td class="td-pad" style="text-align:right;font-family:'DM Mono',monospace;font-size:14px;font-weight:600;color:${total>0?'#e8c97e':'#2a2a30'}">`;
    html += total > 0 ? '$'+fmt(total) : '—';
    html += '</td></tr>';
  });

  html += '</tbody><tfoot><tr class="annual-foot">';
  html += '<td style="font-size:11px;color:#555;letter-spacing:1.5px;text-transform:uppercase">年度合計</td>';
  state.cards.forEach(c => {
    const total = Array.from({length:12}, (_,mi) => getAmount(selectedYear, mi, c.id)).reduce((a,b)=>a+b,0);
    html += `<td style="text-align:right;color:${c.color}">$${fmt(total)}</td>`;
  });
  const grandTotal = state.cards.reduce((s,c) => s + Array.from({length:12},(_,mi)=>getAmount(selectedYear,mi,c.id)).reduce((a,b)=>a+b,0), 0);
  html += `<td style="text-align:right;color:#e8c97e;font-size:15px">$${fmt(grandTotal)}</td>`;
  html += '</tr></tfoot>';
  table.innerHTML = html;
}

function render() {
  if (activeTab === 'monthly') renderMonthly();
  else renderAnnual();
}

// --- Add Card Modal ---
function openAddModal() {
  document.getElementById('new-name').value = '';
  document.getElementById('new-statement').value = '';
  document.getElementById('new-due').value = '';
  selectedColor = COLORS[4];
  renderColorPicker();
  document.getElementById('add-modal').classList.add('open');
  setTimeout(() => document.getElementById('new-name').focus(), 100);
}
function closeAddModal() { document.getElementById('add-modal').classList.remove('open'); }

function renderColorPicker() {
  const picker = document.getElementById('color-picker');
  picker.innerHTML = '';
  COLORS.forEach(col => {
    const div = document.createElement('div');
    div.className = 'color-swatch' + (col === selectedColor ? ' selected' : '');
    div.style.background = col;
    div.style.color = col;
    div.onclick = () => { selectedColor = col; renderColorPicker(); };
    picker.appendChild(div);
  });
}

function addCard() {
  const name = document.getElementById('new-name').value.trim();
  if (!name) { document.getElementById('new-name').focus(); return; }
  const statementDay = parseInt(document.getElementById('new-statement').value) || 1;
  const dueDay = parseInt(document.getElementById('new-due').value) || 1;
  state.cards.push({ id: Date.now(), name, statementDay, dueDay, color: selectedColor });
  save();
  closeAddModal();
  render();
}

// Close modal on overlay click
document.getElementById('add-modal').addEventListener('click', function(e) {
  if (e.target === this) closeAddModal();
});

// --- Delete ---
function askDelete(id, name) {
  deleteTargetId = id;
  document.getElementById('confirm-msg').textContent = `確定要刪除「${name}」嗎？\n該卡所有記錄將一併刪除。`;
  document.getElementById('confirm-dialog').classList.add('open');
}
function closeConfirm() { document.getElementById('confirm-dialog').classList.remove('open'); deleteTargetId = null; }
function confirmDelete() {
  if (!deleteTargetId) return;
  state.cards = state.cards.filter(c => c.id !== deleteTargetId);
  // clean records
  Object.keys(state.records).forEach(k => { if (k.endsWith('-'+deleteTargetId)) delete state.records[k]; });
  save();
  closeConfirm();
  render();
}
document.getElementById('confirm-dialog').addEventListener('click', function(e) {
  if (e.target === this) closeConfirm();
});

// --- Init ---
load();
renderColorPicker();
render();
</script>
